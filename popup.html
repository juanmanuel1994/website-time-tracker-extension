<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Tracker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-icon">⏱</div>
      <h1>Time Tracker</h1>
    </header>

    <div class="current-site" id="currentSite">
      <div class="current-label">Right now</div>
      <div class="current-domain" id="currentDomain">—</div>
      <div class="current-time" id="currentTime">0s</div>
    </div>

    <div class="toggle-row">
      <button class="toggle-btn active" id="btnToday">Today</button>
      <button class="toggle-btn" id="btnTotal">All time</button>
      <button class="reset-btn" id="btnReset" title="Clear statistics">↺</button>
    </div>

    <div class="sites-list" id="sitesList">
      <div class="empty">Browse some websites<br>to see your statistics</div>
    </div>

    <div class="total-row" id="totalRow" style="display:none">
      <span>Total</span>
      <span id="totalTime">0s</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
